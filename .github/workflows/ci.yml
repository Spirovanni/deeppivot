name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Type-check ─────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Check Migrations
        run: npx drizzle-kit check --dialect=postgresql

  # ─── Build ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    env:
      # Minimal stubs so Next.js build doesn't crash on missing env vars.
      # Real secrets are never exposed in CI — only placeholders for build-time validation.
      DATABASE_URL: postgresql://user:password@localhost:5432/deeppivot
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      CLERK_SECRET_KEY: sk_test_placeholder
      CLERK_WEBHOOK_SECRET: whsec_placeholder
      NEXT_PUBLIC_ELEVENLABS_AGENT_ID: agent_placeholder
      NEXT_PUBLIC_ELEVENLABS_API_KEY: placeholder
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /dashboard
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache dependencies and Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Build and Analyze Bundle
        run: ANALYZE=true npm run build > build-output.txt 2>&1

      - name: Report Bundle Size
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let message = "✅ Build completed successfully with `ANALYZE=true`.\n\nCould not extract bundle size details.";

            try {
              if (fs.existsSync('build-output.txt')) {
                const output = fs.readFileSync('build-output.txt', 'utf8');
                const lines = output.split('\n');
                let collecting = false;
                let tableLines = [];
                
                for (const line of lines) {
                  // Clean up ANSI escape codes
                  const plainLine = line.replace(/[\u001b\u009b][[()#;?]*(?:[0-9]{1,4}(?:;[0-9]{0,4})*)?[0-9A-ORZcf-nqry=><]/g, '');
                  
                  if (plainLine.includes('Route (app)') || plainLine.includes('Route (pages)')) {
                    collecting = true;
                  }
                  
                  if (collecting) {
                    if (plainLine.trim() === '' && tableLines.length > 5) {
                      break;
                    }
                    tableLines.push(plainLine.trimEnd());
                  }
                }
                
                if (tableLines.length > 0) {
                  message = "### Next.js Bundle Size Analysis\n\n```text\n" + tableLines.join('\n') + "\n```";
                }
              }
            } catch (error) {
              console.error("Could not read build output", error);
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  # ─── E2E Tests (Playwright) ────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    # Only run on PRs to save CI minutes on every push to main
    if: github.event_name == 'pull_request'

    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL || 'http://localhost:3000' }}
      # Minimal env vars for Next.js dev server (non-functional stubs)
      DATABASE_URL: postgresql://user:password@localhost:5432/deeppivot
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      CLERK_SECRET_KEY: sk_test_placeholder
      CLERK_WEBHOOK_SECRET: whsec_placeholder
      NEXT_PUBLIC_ELEVENLABS_AGENT_ID: agent_placeholder
      NEXT_PUBLIC_ELEVENLABS_API_KEY: placeholder
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /dashboard
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
